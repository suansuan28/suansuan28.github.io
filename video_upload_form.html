<body>

  <h2>选择上传视频或输入视频链接</h2>
  
  <!-- 表单输入部分 -->
  <form id="videoForm" action="upload.php" method="post" enctype="multipart/form-data">
    <label for="videoLink">视频链接:</label>
    <input type="text" id="videoLink" name="videoLink" placeholder="请输入视频链接">
    <br><br>
    
    <label for="videoFile">上传视频:</label>
    <input type="file" id="videoFile" name="videoFile" accept="video/*">

    <button type="submit">提交</button>
  </form>
